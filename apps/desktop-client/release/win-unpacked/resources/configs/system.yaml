# ============================================================
# 系统全局配置文件 configs/system.yaml
# 注意：所有密钥字段必须通过环境变量覆盖，不在此文件中填写！
# 环境变量优先级 > 此文件 > 代码默认值
# ============================================================

# 系统运行模式 (此处为默认值，可被 .env 的 TRADING_MODE 覆盖)
trading_mode: paper

# ---------------------------
# 交易所配置
# ---------------------------
exchange:
  exchange_id: htx
  rate_limit: true
  request_timeout_ms: 10000


# ---------------------------
# 数据层配置
# ---------------------------
data:
  default_timeframe: "1h"
  supported_timeframes:
    - "1m"
    - "5m"
    - "15m"
    - "1h"
    - "4h"
    - "1d"
  default_symbols:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
  storage_dir: "./storage"

# ---------------------------
# 风控硬约束 (此处为默认值，可被 .env 覆盖)
# 所有比例参数必须在 (0, 1] 范围内
# ---------------------------
risk:
  # 单币种最大仓位（占总净值比例）
  max_position_pct: 0.20
  # 组合最大回撤熔断阈值
  max_portfolio_drawdown: 0.10
  # 单日最大亏损止损线
  max_daily_loss: 0.03
  # 连续亏损超过此次数触发熔断
  max_consecutive_losses: 5

# ---------------------------
# 日志配置
# ---------------------------
logging:
  log_level: INFO
  log_dir: "./logs"
