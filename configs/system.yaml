# ============================================================
# 系统全局配置文件 configs/system.yaml
# 注意：所有密钥字段必须通过环境变量覆盖，不在此文件中填写！
# 环境变量优先级 > 此文件 > 代码默认值
# ============================================================

# 系统运行模式 (此处为默认值，可被 .env 的 TRADING_MODE 覆盖)
trading_mode: paper

# ---------------------------
# 交易所配置
# ---------------------------
exchange:
  exchange_id: htx
  rate_limit: true
  request_timeout_ms: 10000


# ---------------------------
# 数据层配置
# ---------------------------
data:
  default_timeframe: "1h"
  supported_timeframes:
    - "1m"
    - "5m"
    - "15m"
    - "1h"
    - "4h"
    - "1d"
  default_symbols:
    - "BTC/USDT"
    - "ETH/USDT"
    - "SOL/USDT"
  storage_dir: "./storage"

# ---------------------------
# 风控硬约束 (此处为默认值，可被 .env 覆盖)
# 所有比例参数必须在 (0, 1] 范围内
# ---------------------------
risk:
  # 单币种最大仓位（占总净值比例）
  max_position_pct: 0.20
  # 组合最大回撤熔断阈值
  max_portfolio_drawdown: 0.10
  # 单日最大亏损止损线
  max_daily_loss: 0.03
  # 连续亏损超过此次数触发熔断
  max_consecutive_losses: 5
  # 熔断冷却期（分钟），超过后自动解除熔断并重置基线
  circuit_breaker_cooldown_minutes: 60

# ---------------------------
# 组合管理配置
# ---------------------------
portfolio:
  enabled: true
  allocation_method: risk_parity   # equal_weight / risk_parity / momentum / minimum_variance
  lookback_bars: 60
  weight_cap: 0.40
  min_weight: 0.0
  rebalance_every_n: 24            # 每24根K线触发定时再平衡 (1h即每天)
  drift_threshold: 0.05            # 权重漂移超过5%触发再平衡
  min_trade_notional: 10.0         # 最小交易金额(USDT)，低于不调仓
  cash_buffer_pct: 0.02            # 保留2%现金缓冲

# ---------------------------
# ML 连续学习配置
# ---------------------------
continuous_learning:
  enabled: true
  retrain_every_n_bars: 500        # 定时重训间隔(K线数)
  min_accuracy_threshold: 0.55     # OOS精度低于此值触发重训
  drift_significance: 0.05         # KS检验显著性水平
  drift_check_window: 100          # 漂移检测使用的近期样本窗口
  max_buffer_size: 10000           # OHLCV缓冲区最大长度
  max_saved_versions: 3            # 最多保留的历史模型版本数
  ab_test_window: 50               # A/B测试窗口(K线数)
  min_bars_for_retrain: 400        # 触发重训所需的最少数据量

# ---------------------------
# 日志配置
# ---------------------------
logging:
  log_level: INFO
  log_dir: "./logs"

# ---------------------------
# Phase 3 高级策略 + 自进化配置
# realtime feed 在 paper 模式下默认开启，且默认走 HTX public market feed。
# 如需离线/无外网验证，可将 provider 切回 mock。
# 可用脚本验证: python scripts/verify_phase3_realtime_feed.py --provider htx --exchange htx --symbol BTC/USDT --timeout 20
# ---------------------------
phase3:
  enabled: true
  realtime_feed_enabled: true
  market_making_enabled: false
  rl_agent_enabled: false
  self_evolution_enabled: false

  realtime_feed:
    provider: htx    # htx | mock
    ws_url:
    reconnect_backoff_sec: 2
    heartbeat_timeout_sec: 15
    orderbook_depth_levels: 20
    snapshot_recovery_enabled: true
    max_gap_tolerance: 1

  market_making:
    risk_aversion_gamma: 0.12
    max_inventory_pct: 0.20
    quote_refresh_ms: 1500
    cancel_on_gap: true
    max_quote_age_sec: 10
    maker_only: true

  rl:
    training_enabled: false
    policy_mode: shadow
    reward_drawdown_penalty: 2.0
    reward_turnover_penalty: 0.2
    action_confidence_floor: 0.55
    max_episode_steps: 1000

  evolution:
    weekly_optimization_cron: "0 3 * * 0"
    shadow_days: 7
    paper_days: 7
    ab_min_samples: 100
    promote_min_sharpe: 0.8
    retire_max_drawdown: 0.10
    auto_rollback_enabled: true

  logging:
    realtime_debug: true
    market_making_debug: true
    rl_debug: true
    evolution_debug: true
    trace_sample_rate: 1.0
